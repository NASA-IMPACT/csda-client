name: Release please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.release-please.outputs.prs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: generate-token
        with:
          app-id: ${{ secrets.CSDA_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CSDA_RELEASE_BOT_PRIVATE_KEY }}
      - name: CSDA Version
        id: csda-version
        uses: NASA-IMPACT/csda-version@156bdc00a784eee7ccd5ccfc7bab0fc75480bcb4 #v0.2.6
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release-please
        with:
          token: ${{ steps.generate-token.outputs.token }}
          release-type: python
          release-as: ${{ steps.csda-version.outputs.version }}
  update-lockfile:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.prs }}
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: generate-token
        with:
          app-id: ${{ secrets.CSDA_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CSDA_RELEASE_BOT_PRIVATE_KEY }}
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ fromJSON(needs.release-please.outputs.prs)[0].headBranchName }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Sync uv
        run: uv sync
      - name: Commit and push changes
        run: |
          git config user.name "csda-release-app[bot]"
          git config user.email "csda-release-app[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update uv.lock"
          git push
