name: Release please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.release-please.outputs.prs }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.CSDA_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CSDA_RELEASE_BOT_PRIVATE_KEY }}
      - name: CSDA Version
        id: csda-version
        uses: NASA-IMPACT/csda-version@v0.2.6
      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          token: ${{ steps.generate-token.outputs.token }}
          release-type: python
          release-as: ${{ steps.csda-version.outputs.version }}
  update-lockfile:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.prs }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.CSDA_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CSDA_RELEASE_BOT_PRIVATE_KEY }}
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ fromJSON(needs.release-please.outputs.prs)[0].headBranchName }}
      - uses: astral-sh/setup-uv@v7
      - name: Sync uv
        run: uv sync
      - name: Commit and push changes
        run: |
          git config user.name "csda-release-app[bot]"
          git config user.email "csda-release-app[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update uv.lock"
          git push
